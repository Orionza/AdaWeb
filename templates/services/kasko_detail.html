{% extends 'base.html' %}

{% block title %}Kasko Detay{% endblock %}
{% load static %}
{% block content %}
<h2>Kasko Sigortası Detayları</h2>
<form>
    <div class="form-group">
        <label for="ilKodu">İl Kodu:</label>
        <input type="text" class="form-control" id="ilKodu" name="ilKodu" required>
    </div>
    <div class="form-group">
        <label for="plakaKodu">Plaka Kodu:</label>
        <input type="text" class="form-control" id="plakaKodu" name="plakaKodu" required>
    </div>
    <div class="form-group">
        <label for="marka">Marka:</label>
        <select class="form-control" id="marka" name="marka" required>
            <option value="">Marka Seçin</option>
            <option value="opel">Opel</option>
            <option value="mercedes">Mercedes</option>
            <!-- Diğer marka seçenekleri -->
        </select>
    </div>
    <div class="form-group">
        <label for="modelYili">Model Yılı:</label>
        <select class="form-control" id="modelYili" name="modelYili" required>
            <option value="">Model Yılı Seçin</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <!-- Diğer model yılı seçenekleri -->
        </select>
    </div>
    <div class="form-group">
        <label for="model">Model:</label>
        <select class="form-control" id="model" name="model" required>
            <option value="">Model Seçin</option>
            <option value="astra">Astra</option>
            <option value="corsa">Corsa</option>
            <!-- Diğer model seçenekleri -->
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Teklif Al</button>
</form>
{% endblock %}
